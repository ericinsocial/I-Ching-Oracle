<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Oracle of Change</title>
</head>

<body style="background:black;color:white;text-align:center;padding-top:100px;">

<h1>Oracle of Change</h1>

<button onclick="draw()">
開始抽卦
</button>

<h2 id="result"></h2>

<script>

const hexagrams=[
"乾",
"坤",
"屯",
"蒙",
"需",
"訟"
];

function draw(){

const random=
Math.floor(Math.random()*hexagrams.length);

document.getElementById("result").innerHTML=
hexagrams[random];

}

</script>

</body>
</html>
