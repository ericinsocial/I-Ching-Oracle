<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Oracle of Change</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- 首頁：選問題 -->
  <main id="homePage" class="page active">

    <section class="home-card">

      <p class="eyebrow">Oracle of Change</p>

      <h1>請選擇你想獲得指引的方向</h1>

      <p class="intro">
        靜下心來，默念你的問題。<br>
        選擇一個方向，讓卦象為你帶來今日的提醒。
      </p>

      <div class="question-grid">

        <button class="question-btn" data-category="love">
          <span>❤️</span>
          <strong>感情</strong>
        </button>

        <button class="question-btn" data-category="career">
          <span>💼</span>
          <strong>工作</strong>
        </button>

        <button class="question-btn" data-category="wealth">
          <span>💰</span>
          <strong>財運</strong>
        </button>

        <button class="question-btn" data-category="general">
          <span>☯</span>
          <strong>我也不知道問什麼</strong>
        </button>

      </div>

    </section>

  </main>


  <!-- 動畫頁 -->
  <section id="animationPage" class="page">

    <canvas id="oracleCanvas"></canvas>

    <div class="animation-overlay">

      <div id="animationMessage" class="animation-message">
        靜心感受你的問題
      </div>

      <div id="revealedHexagram" class="revealed-hexagram hidden">
        <span id="revealedNumber"></span>
        <strong id="revealedName"></strong>
      </div>

    </div>

  </section>


  <!-- 結果頁 -->
  <section id="resultPage" class="page">

    <div class="result-card">

      <p id="resultCategory" class="result-category"></p>

      <h2 id="resultName"></h2>

      <p id="resultSymbol" class="result-symbol"></p>

      <div class="result-block">
        <h3>卦象</h3>
        <p id="resultImage"></p>
      </div>

      <div class="result-block">
        <h3>神諭</h3>
        <p id="resultOracle"></p>
      </div>

      <div class="result-block">
        <h3>今日提醒</h3>
        <p id="resultAdvice"></p>
      </div>

      <div class="button-row">

        <button id="drawAgainBtn" class="main-btn">
          再抽一次
        </button>

        <button id="backHomeBtn" class="ghost-btn">
          回到首頁
        </button>

      </div>

    </div>

  </section>


  <script src="oracle.js"></script>
  <script src="animation.js"></script>

</body>
</html>
