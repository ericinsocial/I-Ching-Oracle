<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>詠真堂</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- 首頁：選問題 -->
  <main id="homePage" class="page active">

    <section class="home-card">

      <img class="site-logo" src="logo.png" alt="詠真堂">

      <h1>有些問題，不是沒有答案<br>是不敢看答案。！</h1>

      <p class="intro">
        有些答案&nbsp;&nbsp;只差一卦
      </p>

      <div class="question-grid">

        <button class="question-btn" data-category="love">
          <span>❤️</span>
          <strong>感情</strong>
        </button>

        <button class="question-btn" data-category="career">
          <span>💼</span>
          <strong>工作</strong>
        </button>

        <button class="question-btn" data-category="wealth">
          <span>💰</span>
          <strong>財運</strong>
        </button>

        <button class="question-btn" data-category="general">
          <span>☯</span>
          <strong>我也不知道問什麼</strong>
        </button>

      </div>

    </section>

  </main>


  <!-- 動畫頁 -->
  <section id="animationPage" class="page">

    <canvas id="oracleCanvas"></canvas>

    <div class="animation-overlay">

      <div id="animationMessage" class="animation-message">
        靜心感受你的問題
      </div>

      <div id="revealedHexagram" class="revealed-hexagram hidden">
        <span id="revealedNumber"></span>
        <strong id="revealedName"></strong>
      </div>

    </div>

  </section>


  <!-- 結果頁 -->
  <section id="resultPage" class="page">

    <div class="result-card">

      <img class="site-logo" src="logo.png" alt="詠真堂">

      <div class="result-heading">
        <h2 id="resultTitle"></h2>
        <p id="resultTrigram" class="result-trigram"></p>
      </div>

      <div class="result-separator">────────────────</div>

      <h3 id="resultCategory" class="result-category"></h3>

      <p id="resultAdvice" class="result-advice"></p>

      <div class="result-separator">────────────────</div>

      <p id="resultOracle" class="result-oracle"></p>

      <div class="result-separator">────────────────</div>

      <div class="button-row">

        <button id="drawAgainBtn" class="main-btn">
          再抽一次
        </button>

        <button id="backHomeBtn" class="ghost-btn">
          回首頁
        </button>

        <a id="bookingBtn" class="main-btn booking-btn" href="https://lin.ee/9T6G8mH" target="_blank" rel="noopener noreferrer">
          點我預約
        </a>

        <button id="shareResultBtn" class="ghost-btn">
          分享結果
        </button>

      </div>

    </div>

  </section>


  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="oracle.js"></script>
  <script src="animation.js"></script>

</body>
</html>
